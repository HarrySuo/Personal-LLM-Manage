services:
  - type: web
    name: llm-config-manager
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config-server-cloud:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_TOKEN
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/data
    disk:
      name: config-data
      mountPath: /opt/render/project/data
      sizeGB: 1
